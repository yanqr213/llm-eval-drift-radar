name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run example report
        run: |
          python -m llm_eval_drift_radar \
            --baseline examples/baseline.jsonl \
            --current examples/current.jsonl \
            --thresholds examples/thresholds.json \
            --format markdown \
            --output llm-eval-drift-report.md
          test -s llm-eval-drift-report.md
